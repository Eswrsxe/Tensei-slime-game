<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tensei Slime: v4.0 (Guilda e Eventos)</title>
    <link rel="stylesheet" href="styles.css">
    <style>.hidden { display: none !important; }</style>
</head>
<body>
    <div id="game-container">
        <header id="hud">
            <div class="player-info">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h2 id="player-name">Slime (Sem Nome)</h2>
                    <div style="display: flex; gap: 5px;">
                        <button id="btn-auto" style="background: transparent; border: 1px solid var(--sage-color); color: var(--sage-color); padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold;">AUTO: OFF</button>
                        <button id="btn-google" style="background: #4285f4; border: 1px solid #4285f4; color: white; padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold;">Salvar no Google</button>
                    </div>
                </div>
                <div style="margin-top: 5px; display: flex; justify-content: space-between; align-items: center;">
                    <div><span id="player-level">Lvl: 1</span> | <span id="player-form" style="color: var(--accent-blue);">Forma: Slime</span></div>
                    <button id="btn-rankup" class="hidden" style="background: #da3633; color: white; border: none; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer;">Evoluir Espécie</button>
                </div>
            </div>
            <div class="bars">
                <div class="bar-container"><div id="hp-bar" class="fill hp"></div><span id="hp-text">HP: --/--</span></div>
                <div class="bar-container"><div id="mp-bar" class="fill mp"></div><span id="mp-text">MP: --/--</span></div>
                <div class="bar-container" style="height: 10px; margin-top: 2px;"><div id="exp-bar" class="fill exp"></div><span id="exp-text" style="font-size: 9px; line-height: 10px;">EXP: --/--</span></div>
                <div id="wallet-display">0 Cobre</div>
            </div>
        </header>

        <main id="combat-display"><div id="combat-log"></div></main>

        <div id="chat-panel" class="hidden" style="display: flex; gap: 5px; padding: 10px; background: var(--panel-bg); border-top: 1px solid #30363d; margin-top: auto;">
            <input type="text" id="chat-input" placeholder="Responda A, B ou C..." autocomplete="off" style="flex: 1; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 10px; border-radius: 4px; font-family: 'Courier New', monospace; text-transform: uppercase;">
            <button id="btn-send-chat" class="action-btn" style="width: auto; background: #238636; border-color: #2ea043; color: white;">Falar</button>
        </div>

        <div id="offline-modal" class="modal hidden"><div class="modal-content" style="border-color: #ffd700;"><h3 style="color: #ffd700;">《 Grande Sábio 》 Relatório</h3><div id="offline-report-content" class="item-grid" style="text-align: left;"></div><button id="btn-collect-offline" class="action-btn" style="width:100%; background: #238636; border-color: #2ea043; color: white;">Coletar</button></div></div>
        <div id="skills-modal" class="modal hidden"><div class="modal-content"><h3>《 Grande Sábio 》 Mimetismo</h3><div id="forms-list" class="item-grid"></div><button class="action-btn btn-close-modal" style="width:100%;">Fechar</button></div></div>
        
        <div id="inventory-modal" class="modal hidden">
            <div class="modal-content">
                <h3>《 Grande Sábio 》 Estômago</h3>
                <div id="loadout-display" style="display: flex; justify-content: space-around; background: #010409; padding: 10px; border-radius: 6px; border: 1px solid #30363d; margin-bottom: 15px;">
                    <div style="text-align: center;"><span style="font-size:10px; color:#8b949e; display:block;">Arma</span><span id="eqp-weapon" style="font-size:12px; color:#da3633; font-weight:bold;">Vazio</span></div>
                    <div style="text-align: center;"><span style="font-size:10px; color:#8b949e; display:block;">Armadura</span><span id="eqp-armor" style="font-size:12px; color:#3fb950; font-weight:bold;">Vazio</span></div>
                    <div style="text-align: center;"><span style="font-size:10px; color:#8b949e; display:block;">Acessório</span><span id="eqp-accessory" style="font-size:12px; color:#d2a8ff; font-weight:bold;">Vazio</span></div>
                </div>
                <div id="inventory-list" class="item-grid"></div>
                <button class="action-btn btn-close-modal" style="width:100%;">Fechar</button>
            </div>
        </div>

        <div id="village-modal" class="modal hidden">
            <div class="modal-content">
                <h3>《 Grande Sábio 》 Nação Tempest</h3>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button id="tab-subs" class="tab-btn active">Cidadãos</button>
                    <button id="tab-exped" class="tab-btn">Expedir</button>
                    <button id="tab-upgrades" class="tab-btn">Infra.</button>
                    <button id="tab-map" class="tab-btn">Mapa</button>
                </div>
                <div id="village-list" class="item-grid"></div>
                <button class="action-btn btn-close-modal" style="width:100%;">Fechar</button>
            </div>
        </div>

        <div id="guild-modal" class="modal hidden"><div class="modal-content"><h3 style="color: #f778ba;">Associação de Aventureiros</h3><div id="quest-list" class="item-grid"></div><button class="action-btn btn-close-modal" style="width:100%;">Fechar</button></div></div>

        <footer id="action-panel">
            <button id="btn-attack" class="action-btn">Atacar</button>
            <button id="btn-defend" class="action-btn">Defender</button>
            <button id="btn-magic" class="action-btn" style="grid-column: span 2; border-color: #58a6ff; color: #58a6ff; font-size: 12px;">Magia: Lâmina de Água</button>
            <button id="btn-inventory" class="action-btn">Estômago</button>
            <button id="btn-skills" class="action-btn">Mimetismo</button>
            <button id="btn-guild" class="action-btn" style="border-color: #f778ba; color: #f778ba;">Guilda</button>
            <button id="btn-village" class="action-btn" style="border-color: #d2a8ff; color: #d2a8ff;">Tempest</button>
            <div style="display: flex; gap: 10px; grid-column: span 2;"><button id="btn-predator" class="action-btn special" disabled style="flex: 1;">Predador</button><button id="btn-name-monster" class="action-btn" disabled style="flex: 1; background: #238636; border-color: #2ea043; color: white;">Nomear</button></div>
        </footer>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
